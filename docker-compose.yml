version: "3.9"

services:
  frontend:
    build: ./frontend
    container_name: medicost_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: always

  backend:
    build: ./backend
    container_name: medicost_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - SUPABASE_URL=${SUPABASE_URL}
      - SUPABASE_KEY=${SUPABASE_KEY}
      - GEMINI_KEY=${GEMINI_KEY:-}
      - DEBUG=${DEBUG:-false}
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
